# config.yaml
# MLB 擊球分析混合模型配置檔案

# 資料設定
data:
  data_dir: "datasets"
  start_year: 2015
  cache_enabled: true
  
# 模型設定
model:
  # 基本參數
  name: "baseball_dual_model.pkl"
  random_state: 42
  test_size: 0.3
  val_size: 0.5  # 從測試集中再切一半給驗證集
  
  # 訓練參數
  training:
    device: "cuda"  # 可選: cuda, cpu
    tree_method: "hist"
    early_stopping_rounds: 15
    
  # 超參數搜尋空間
  param_dist:
    n_estimators: [500, 800]
    learning_rate: [0.01, 0.05, 0.1]
    max_depth: [8, 10, 12]
    subsample: [0.8]
    gamma: [0.1, 0.5]
    
  # 增量訓練參數
  incremental:
    learning_rate: 0.01
    n_estimators: 100
    
# 物理模擬參數
physics:
  g: 9.81  # 重力加速度 (m/s²)
  rho: 1.225  # 空氣密度 (kg/m³)
  area: 0.00421  # 棒球截面積 (m²)
  m: 0.145  # 棒球質量 (kg)
  dt: 0.01  # 模擬時間步長 (秒)
  hit_pos: [0, 0, 1.0]  # 擊球位置 (x, y, z) (m)
  
  # 阻力係數搜尋範圍
  cd_range:
    min: 0.1
    max: 1.0
    iterations: 10
    
# 球場設定
park:
  default: "generic"  # 預設使用通用球場
  default_id: 3  # 預設球場ID為0時使用通用球場
  
  # 通用球場設定
  generic:
    foul_line_ft: 328  # 邊線距離 (ft)
    center_field_ft: 400  # 中外野距離 (ft)
    wall_height_m: 3  # 全壘打牆高度 (m)
    base_dist_ft: 90  # 壘間距離 (ft)
  
  # 特定球場設定檔案
  specific_park_data: "park_data/ballpark_data.json"
  
  # 球場ID映射表
  park_id_mapping:
    0: "generic"
    1: "Angel Stadium"
    2: "Oriole Park at Camden Yards"
    3: "Fenway Park"
    4: "Rate Field"
    5: "Progressive Field"
    7: "Kauffman Stadium"
    10: "Oakland Coliseum"
    12: "Tropicana Field"
    13: "Globe Life Park in Arlington"
    14: "Rogers Centre"
    15: "Chase Field"
    16: "Turner Field"
    17: "Wrigley Field"
    19: "Coors Field"
    22: "Dodger Stadium"
    31: "PNC Park"
    32: "American Family Field"
    680: "T-Mobile Park"
    2392: "Daikin Park"
    2394: "Comerica Park"
    2395: "Oracle Park"
    2523: "George M. Steinbrenner Field"
    2529: "Sutter Health Park"
    2536: "TD Ballpark"
    2602: "Great American Ball Park"
    2680: "Petco Park"
    2681: "Citizens Bank Park"
    2756: "Sahlen Field"
    2889: "Busch Stadium"
    3289: "Citi Field"
    3309: "Nationals Park"
    3312: "Target Field"
    3313: "Yankee Stadium"
    3949: "Rickwood Field"
    4169: "loanDepot park"
    4705: "Truist Park"
    5325: "Globe Life Field"
    5445: "Field of Dreams"
    6130: "Speedway"
  
# 標籤映射
labels:
  OUT: 0
  SINGLE: 1
  DOUBLE: 2
  TRIPLE: 3
  HR: 4
  
# 作弊模式設定
cheat_mode:
  ev_threshold: 85  # mph
  dist_threshold: 300  # ft
  ev_max: 115  # mph
  dist_max: 500  # ft
  
# 日誌設定
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/baseball_predictor.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 影片設定
video:
  output_dir: "videos"
  fps: 30
  dpi: 200
  default_interval: 50  # 毫秒
  rotation: true  # 是否預設旋轉視角
  codec: "h264"
  bitrate: 1800
  show_animation: true  # 是否在預測過程中顯示動畫（會影響性能）